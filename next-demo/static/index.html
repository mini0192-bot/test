<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Clinic Scheduler — Preview</title>
    <style>
      :root{--bg:#ffffff;--text:#000000;--muted:#6b7280;--accent:#16a34a}
      html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;padding:0;margin:0}
      .page{min-height:100%;display:flex;align-items:center;justify-content:center;padding:48px}
      .card{width:100%;max-width:900px;background:transparent;border-radius:12px}
      .hero{display:flex;gap:32px;align-items:center}
      .hero img{width:260px;height:auto;border-radius:8px}
      h1{font-size:28px;margin:0 0 8px}
      p.lead{color:var(--muted);margin:0 0 20px}
      .panel{background:#fff;border-radius:10px;padding:20px;border:1px solid #f1f3f5}
      table{width:100%;border-collapse:collapse;margin-top:8px}
      th,td{text-align:left;padding:12px;border-bottom:1px solid #f3f4f6}
      .status-booked{color:var(--text)}
      .status-no-show{color:var(--muted);text-decoration:line-through}
      .btn{background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
      .btn:disabled{opacity:0.6;cursor:default}
      @media(max-width:720px){.hero{flex-direction:column}.hero img{width:100%}}
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="hero">
          <img src="/static/hero.svg" alt="clinic illustration" />
          <div>
            <h1>Clinic Scheduler</h1>
            <p class="lead">Minimal preview — white background, black text, green accent. Mark no-shows to simulate handling and waitlist automation.</p>
            <div class="panel">
              <p id="status">Loading appointments…</p>
              <div id="app"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      async function load() {
        try {
          const res = await fetch('/api/appointments')
          const data = await res.json()
          render(data)
        } catch (e) {
          document.getElementById('status').textContent = 'Failed to load: '+e.message
        }
      }
      function render(items){
        document.getElementById('status').textContent = ''
        const app = document.getElementById('app')
        if(!items.length){ app.textContent='No appointments' ; return }
        const table = document.createElement('table')
        const thead = document.createElement('thead')
        thead.innerHTML = '<tr><th>Time</th><th>Patient</th><th>Status</th><th></th></tr>'
        table.appendChild(thead)
        const tbody = document.createElement('tbody')
        items.forEach(a=>{
          const tr = document.createElement('tr')
          tr.innerHTML = `<td>${a.time}</td><td>${a.name}</td><td id="s-${a.id}" class="${a.status==='no-show'?'status-no-show':'status-booked'}">${a.status}</td><td></td>`
          const td = tr.querySelector('td:last-child')
          if(a.status !== 'no-show'){
            const btn = document.createElement('button')
            btn.textContent='Mark no-show'
            btn.className='btn'
            btn.onclick = ()=>{
              document.getElementById('s-'+a.id).textContent='no-show'
              document.getElementById('s-'+a.id).className='status-no-show'
              btn.disabled = true
            }
            td.appendChild(btn)
          }
          tbody.appendChild(tr)
        })
        table.appendChild(tbody)
        app.appendChild(table)
      }
      load()
    </script>
  </body>
</html>
